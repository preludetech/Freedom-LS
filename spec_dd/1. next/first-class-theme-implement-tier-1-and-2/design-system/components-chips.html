<!doctype html>
<html><head><meta charset="utf-8"><title>Status chips</title>
<link rel="stylesheet" href="_card.css">
<style>
  .chip {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 12px; border-radius:999px;
    font-family:var(--font-body); font-weight:600; font-size:12px;
  }
  .dot { width:6px; height:6px; border-radius:999px; }
</style>
</head><body>
<div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center">
  <span class="chip" style="background:#F0FFF4;color:#22543D"><span class="dot" style="background:#38A169"></span>Complete</span>
  <span class="chip" style="background:#FFFFF0;color:#744210"><span class="dot" style="background:#D69E2E"></span>In progress</span>
  <span class="chip" style="background:#EDF2F7;color:#4A5568"><span class="dot" style="background:#A0AEC0"></span>Locked</span>
  <span class="chip" style="background:#FFF5F5;color:#742A2A"><span class="dot" style="background:#E53E3E"></span>Failed</span>
  <span class="chip" style="background:#EBF8FF;color:#2A4365"><span class="dot" style="background:#3182CE"></span>Awaiting review</span>
  <span class="chip" style="background:rgba(40,53,147,.08);color:#283593"><span class="dot" style="background:#283593"></span>Practical</span>
  <span class="chip" style="background:rgba(0,206,201,.15);color:#0b3a3a"><span class="dot" style="background:#00CEC9"></span>72% scored</span>
</div>
</body></html>
