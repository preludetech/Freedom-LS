<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="row" style="gap:16px">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="width:96px;height:64px;background:var(--grey-100);border:1px solid var(--border);border-radius:6px"></div>
    <div style="font-family:var(--font-heading);font-weight:600;font-size:13px">6px · sm</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">chips, badges</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="width:96px;height:64px;background:var(--grey-100);border:1px solid var(--border);border-radius:8px"></div>
    <div style="font-family:var(--font-heading);font-weight:600;font-size:13px">8px · default</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">buttons, inputs</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="width:96px;height:64px;background:var(--grey-100);border:1px solid var(--border);border-radius:12px"></div>
    <div style="font-family:var(--font-heading);font-weight:600;font-size:13px">12px · lg</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">cards, modals</div>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
    <div style="width:96px;height:32px;background:var(--grey-100);border:1px solid var(--border);border-radius:999px"></div>
    <div style="font-family:var(--font-heading);font-weight:600;font-size:13px">pill · 999</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">status pills</div>
  </div>
</div>
</body></html>
