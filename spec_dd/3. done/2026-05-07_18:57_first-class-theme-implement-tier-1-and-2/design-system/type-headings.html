<!doctype html>
<html><head><meta charset="utf-8"><title>Type — display & headings</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row-spec { display:flex; align-items:baseline; gap:16px; padding:6px 0; border-bottom:1px solid var(--grey-100); }
  .row-spec:last-child { border-bottom:none; }
  .row-spec .label { width:60px; color:var(--fg-3); font-family:var(--font-mono); font-size:11px; }
  .row-spec .meta  { margin-left:auto; color:var(--fg-3); font-family:var(--font-mono); font-size:10px; }
</style>
</head><body>
<div class="row-spec">
  <div class="label">Display</div>
  <div style="font-family:var(--font-heading);font-weight:700;font-size:48px;line-height:1.1;letter-spacing:-0.02em;color:var(--fg-1)">Training, elevated.</div>
  <div class="meta">Outfit&nbsp;Bold · 48 / 1.1</div>
</div>
<div class="row-spec">
  <div class="label">H1</div>
  <div style="font-family:var(--font-heading);font-weight:700;font-size:40px;line-height:1.2;letter-spacing:-0.02em">Built for the standard</div>
  <div class="meta">Outfit&nbsp;Bold · 40 / 1.2</div>
</div>
<div class="row-spec">
  <div class="label">H2</div>
  <div style="font-family:var(--font-heading);font-weight:600;font-size:32px;line-height:1.25;letter-spacing:-0.015em">Module 4 — Controlled airspace</div>
  <div class="meta">Outfit&nbsp;Semi · 32 / 1.25</div>
</div>
<div class="row-spec">
  <div class="label">H3</div>
  <div style="font-family:var(--font-heading);font-weight:600;font-size:24px;line-height:1.3">Pre-flight checklist</div>
  <div class="meta">Outfit&nbsp;Semi · 24 / 1.3</div>
</div>
<div class="row-spec">
  <div class="label">H4</div>
  <div style="font-family:var(--font-heading);font-weight:600;font-size:20px;line-height:1.4">Section 3.2</div>
  <div class="meta">Outfit&nbsp;Semi · 20 / 1.4</div>
</div>
</body></html>
