<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="Request flow diagram with three labelled parts: A the browser, B the server, C the response">
  <rect width="600" height="400" fill="#F7F8FA"/>

  <!-- Browser box -->
  <rect x="40" y="150" width="140" height="100" rx="10" fill="#2B6CB0"/>
  <text x="110" y="205" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">Browser</text>

  <!-- Server box -->
  <rect x="420" y="150" width="140" height="100" rx="10" fill="#1A2332"/>
  <text x="490" y="205" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="middle">Server</text>

  <!-- Arrow A: request browser -> server -->
  <line x1="190" y1="175" x2="410" y2="175" stroke="#4A5568" stroke-width="4"/>
  <polygon points="410,175 396,168 396,182" fill="#4A5568"/>

  <!-- Arrow C: response server -> browser -->
  <line x1="410" y1="225" x2="190" y2="225" stroke="#4A5568" stroke-width="4"/>
  <polygon points="190,225 204,218 204,232" fill="#4A5568"/>

  <!-- Marker A on the request arrow -->
  <circle cx="300" cy="145" r="22" fill="#E8553D"/>
  <text x="300" y="153" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">A</text>

  <!-- Marker B on the server -->
  <circle cx="490" cy="110" r="22" fill="#38A169"/>
  <text x="490" y="118" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">B</text>

  <!-- Marker C on the response arrow -->
  <circle cx="300" cy="255" r="22" fill="#2B6CB0"/>
  <text x="300" y="263" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">C</text>
</svg>
