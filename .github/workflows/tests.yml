name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync
      - run: uv run ruff check --output-format=github .
      - run: uv run ruff format --check .

  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync
      - run: uv run mypy .
        env:
          DJANGO_SETTINGS_MODULE: config.settings_dev

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pguser
          POSTGRES_PASSWORD: password
          POSTGRES_DB: db
        ports:
          - 6543:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # Non-superuser roles must exist before pytest runs: pytest-env sets
      # FLS_APP_DB_USER=fls_app etc (see pyproject.toml) so that migration
      # 0002's REVOKE UPDATE/DELETE grants actually take effect under test.
      - name: Provision non-superuser DB roles
        env:
          PGPASSWORD: password
        run: |
          psql -h 127.0.0.1 -p 6543 -U pguser -d postgres <<'SQL'
            CREATE ROLE fls_app WITH LOGIN PASSWORD 'fls_app_pw' CREATEDB NOSUPERUSER;
            CREATE ROLE fls_erasure_role NOLOGIN;
            CREATE ROLE fls_erasure_user WITH LOGIN PASSWORD 'fls_erasure_pw' NOSUPERUSER;
            GRANT fls_erasure_role TO fls_erasure_user;
            ALTER DATABASE db OWNER TO fls_app;
          SQL

      - name: Run unit tests
        run: uv run pytest -m "not playwright"

  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: pguser
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 6543:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Install Python dependencies
        run: uv sync

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run tailwind_build

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Provision non-superuser DB roles
        env:
          PGPASSWORD: password
        run: |
          psql -h 127.0.0.1 -p 6543 -U pguser -d postgres <<'SQL'
            CREATE ROLE fls_app WITH LOGIN PASSWORD 'fls_app_pw' CREATEDB NOSUPERUSER;
            CREATE ROLE fls_erasure_role NOLOGIN;
            CREATE ROLE fls_erasure_user WITH LOGIN PASSWORD 'fls_erasure_pw' NOSUPERUSER;
            GRANT fls_erasure_role TO fls_erasure_user;
            ALTER DATABASE test_db OWNER TO fls_app;
          SQL

      - name: Run Playwright tests
        run: uv run pytest -m playwright

      - name: Upload Playwright traces
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
