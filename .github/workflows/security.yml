name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --dev
      - name: Run Bandit
        run: uv run bandit -r . -x ./tests,./.venv -f sarif -o bandit.sarif --severity-level medium
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit.sarif

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync
      - name: Run pip-audit
        # TODO: remove --ignore-vuln once pip 26.1 is released on PyPI.
        # CVE-2026-3219: pip <=26.0.1 misinterprets tar+ZIP archives. Fixed in pip 26.1
        # (pypa/pip#13870), but 26.1 is not yet published to PyPI. pip is only a
        # transitive dev dependency here (pip-api -> pip-audit) and is not used at runtime.
        run: uv run pip-audit

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run Semgrep
        run: semgrep scan --config auto --sarif -o semgrep.sarif
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  django-check-deploy:
    name: Django Deployment Check
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-dummy-key-that-is-long-enough-for-django-deploy-check-validation  # pragma: allowlist secret
      HOST_DOMAIN: example.com
      DB_NAME: ci
      DB_USER: ci
      DB_PASSWORD: ci  # pragma: allowlist secret
      FLS_ERASURE_DB_USER: fls_erasure_user
      FLS_ERASURE_DB_PASSWORD: fls_erasure_pw  # pragma: allowlist secret
      HSTS_INCLUDE_SUBDOMAINS: "True"
      HSTS_PRELOAD: "True"
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install npm dependencies
        run: npm ci
      - name: Run Django check --deploy
        run: uv run python manage.py check --deploy --fail-level WARNING --settings=config.settings_prod
