name: Notify Downstream Repos

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        repo:
          - bloom_ls
          - first_class_ls
          # add more repos here
    steps:
      - name: Trigger ${{ matrix.repo }}
        run: |
          curl --fail -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CROSS_REPO_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ matrix.repo }}/dispatches \
            -d '{"event_type": "fls-updated", "client_payload": {"sha": "${{ github.sha }}", "repo": "${{ github.repository }}"}}'
