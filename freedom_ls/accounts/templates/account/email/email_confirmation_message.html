{% extends "emails/base_email.html" %}

{% block content %}
<p style="margin: 0 0 16px 0; font-size: 16px; line-height: 1.5;">Please confirm your email address by clicking the button below.</p>
{% endblock %}

{% block cta %}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin: 24px 0;">
  <tr>
    <td style="background-color: {{ email_color_primary }}; border-radius: 6px;">
      <a href="{{ activate_url }}" style="display: inline-block; padding: 12px 32px; color: #FFFFFF; text-decoration: none; font-weight: bold; font-size: 16px;">Confirm Email Address</a>
    </td>
  </tr>
</table>
<p style="margin: 8px 0 0 0; font-size: 13px; color: {{ email_color_muted }};">Or copy this link: {{ activate_url }}</p>
{% endblock %}
