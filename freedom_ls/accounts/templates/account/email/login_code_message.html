{% extends "emails/base_email.html" %}

{% block content %}
  <p style="margin: 0 0 16px 0; font-size: 16px; line-height: 1.5;">Your login code is:</p>
  <table role="presentation" cellpadding="0" cellspacing="0" style="width: 100%; margin: 0 0 16px 0;">
    <tr>
      <td align="center" style="padding: 20px; background-color: {{ email_color_surface_2 }}; border-radius: 8px;">
        <span style="font-family: 'Courier New', Courier, monospace; font-size: 32px; font-weight: bold; letter-spacing: 6px; color: {{ email_color_foreground }};">{{ code }}</span>
      </td>
    </tr>
  </table>
  <p style="margin: 0 0 16px 0; font-size: 16px; line-height: 1.5;">This code will expire shortly.</p>
{% endblock %}
