{% extends "_base.html" %}

{% block head_title %}{{ doc.title }}{% endblock %}

{% block content %}
    <c-page width="narrow">
        <div class="space-y-6">
            <header class="space-y-1">
                <h1 class="text-3xl font-bold">{{ doc.title }}</h1>
                <p class="text-sm text-muted">
                    Version {{ doc.version }} &middot; Effective {{ doc.effective_date }}
                </p>
            </header>

            <c-markdown-container>
                {{ rendered|safe }}
            </c-markdown-container>
        </div>
    </c-page>
{% endblock content %}
