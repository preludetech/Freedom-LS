{# djlint:off H037 H026 H021 #}
<c-dropdown-menu trigger_class="cursor-pointer rounded-full focus:outline-none focus-visible:ring-2 focus-visible:ring-[var(--color-focus-ring)] focus-visible:ring-offset-2"
                 aria_label="Open user menu for {{ user.display_name }}">
    <c-slot name="trigger">
        <span class="inline-flex h-10 w-10 items-center justify-center
                     rounded-full bg-header-action text-on-header-action
                     font-semibold text-base leading-none select-none"
              aria-hidden="true">
            {% if user.initials %}
                {{ user.initials }}
            {% else %}
                <c-icon name="user" class="size-5" />
            {% endif %}
        </span>
    </c-slot>

    <c-button dropdown="true" href="{% url 'accounts:account_profile' %}">
        Profile
    </c-button>
    {% if user.is_staff %}
        <c-button dropdown="true" href="{% url 'educator_interface:interface' '' %}">
            Educator Interface
        </c-button>
        <c-button dropdown="true" href="/admin/" hx-boost="false">
            Admin Panel
        </c-button>
    {% endif %}

    {% with dropdown=True %}
        {% include "partials/logout_button.html" %}
    {% endwith %}
</c-dropdown-menu>
{# djlint:on H037 H026 H021 #}
