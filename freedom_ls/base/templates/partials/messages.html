{% if messages %}
    <div aria-live="assertive" class="fixed top-24 left-1/2 -translate-x-1/2 w-full max-w-2xl px-4 pointer-events-none z-50">
        <div class="flex flex-col gap-3">
            {% for message in messages %}
                <div
                    x-data="message"
                    x-show="show"
                    x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="opacity-0 translate-x-full"
                    x-transition:enter-end="opacity-100 translate-x-0"
                    x-transition:leave="transition ease-in duration-200"
                    x-transition:leave-start="opacity-100 translate-x-0"
                    x-transition:leave-end="opacity-0 translate-x-full"
                    class="pointer-events-auto bg-surface rounded-lg shadow-lg border-l-4 flex items-start gap-3 p-4
                    {% if 'debug' in message.tags %}
                        border-muted
                    {% elif 'info' in message.tags %}
                        border-primary
                    {% elif 'success' in message.tags %}
                        border-success
                    {% elif 'warning' in message.tags %}
                        border-warning
                    {% elif 'error' in message.tags %}
                        border-danger
                    {% else %}
                        border-primary
                    {% endif %}"
                >
                    <!-- Icon indicator -->
                    <div class="shrink-0 mt-0.5">
                        {% if 'success' in message.tags %}
                            <c-icon name="success" class="size-5 text-success" />
                        {% elif 'error' in message.tags %}
                            <c-icon name="error" class="size-5 text-danger" />
                        {% elif 'warning' in message.tags %}
                            <c-icon name="warning" class="size-5 text-warning" />
                        {% else %}
                            <c-icon name="info" class="size-5 text-primary" />
                        {% endif %}
                    </div>

                    <!-- Message text -->
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium leading-relaxed">{{ message }}</p>
                    </div>

                    <!-- Close button -->
                    <button
                        x-on:click="dismiss"
                        class="shrink-0 text-muted hover:text-foreground transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded"
                        aria-label="Dismiss"
                    >
                        <c-icon name="close" class="size-4" />
                    </button>
                </div>
            {% endfor %}
        </div>
    </div>
{% endif %}
