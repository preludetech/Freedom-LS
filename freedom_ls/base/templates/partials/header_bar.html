<header class="bg-header text-on-header sticky top-0 z-30
               shadow-md data-[scrolled=true]:shadow-lg
               transition-shadow duration-200 motion-reduce:transition-none
               p-3 sm:p-4 flex justify-between items-center"
        x-data="headerScroll"
        x-bind:data-scrolled="scrolled">
    <a href="/" class="flex-shrink min-w-0">
        <h1 class="text-lg sm:text-xl lg:text-2xl font-bold text-on-header truncate">
            {{ site_title }}
        </h1>
    </a>

    <nav class="flex-shrink-0 ml-2 sm:ml-4">
        {% if user.is_authenticated %}
            {% include "partials/header_bar_user_menu.html" %}

        {% endif %}
    </nav>
</header>
