{% extends "_base.html" %}

{% block body %}

    <div x-data="sidebarComponent"
         data-storage-key="{% block sidebar_storage_key %}sidebar{% endblock sidebar_storage_key %}"
         data-sidebar-heading="{% block sidebar_heading %}{% endblock sidebar_heading %}">

        <!-- Header bar: toggle button + contextual text -->
        <div class="flex items-center border-b border-border bg-surface">
            <!-- Left section: sidebar heading + close button (desktop, sidebar open) -->
            <div x-bind:class="headerBarLeftClass">
                <span class="text-sm font-semibold text-muted truncate"
                      x-text="$root.dataset.sidebarHeading">
                </span>
                <button x-on:click="closeSidebar"
                        class="p-1 rounded-md text-muted hover:text-foreground hover:bg-surface-2 transition-colors cursor-pointer"
                        aria-label="Close sidebar">
                    <c-icon name="menu_close" class="size-5" />
                </button>
            </div>

            <!-- Toggle button: visible when sidebar is closed -->
            <div x-bind:class="headerBarToggleClass">
                <button x-on:click="toggle"
                        class="p-2 rounded-md text-muted hover:text-foreground hover:bg-surface-2 transition-colors cursor-pointer"
                        aria-label="Open sidebar"
                        x-bind:aria-expanded="sidebarOpen">
                    <c-icon name="menu_open" class="size-5" />
                </button>
            </div>

            <!-- Center: contextual text -->
            <div class="flex-1 min-w-0 text-center px-2">
                <span class="text-sm font-medium text-muted truncate">
                    {% block header_bar_text %}
                    {% endblock header_bar_text %}
                </span>
            </div>

            <!-- Right spacer to balance layout -->
            <div class="w-10">
            </div>
        </div>

        <!-- Mobile backdrop -->
        <div x-cloak
             x-show="backdropVisible"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             x-on:click="closeSidebar"
             class="fixed z-30 bg-black/50"
             style="top: var(--sidebar-top);
                    bottom: 0;
                    left: 0;
                    right: 0"
             aria-hidden="true">
        </div>

        <!-- Sidebar + content flex container -->
        <div class="flex relative {% block sidebar_class %}{% endblock sidebar_class %}">

            <!-- Sidebar column -->
            <div x-bind:class="sidebarColumnClass">
                <!-- Sidebar panel -->
                <div x-cloak
                     x-show="sidebarOpen"
                     x-on:click="handleSidebarClick"
                     x-transition:enter="transition-all duration-300 ease-out"
                     x-transition:enter-start="opacity-0 -translate-x-2"
                     x-transition:enter-end="opacity-100 translate-x-0"
                     x-transition:leave="transition-all duration-200 ease-in"
                     x-transition:leave-start="opacity-100 translate-x-0"
                     x-transition:leave-end="opacity-0 -translate-x-2"
                     x-bind:class="sidebarPanelClass"
                     style="top: var(--sidebar-top);
                            bottom: 0">
                    <!-- Mobile sidebar header -->
                    <div class="flex items-center justify-between p-4 lg:hidden">
                        <span class="text-sm font-semibold text-muted truncate"
                              x-text="$root.dataset.sidebarHeading">
                        </span>
                        <button x-on:click="closeSidebar"
                                class="p-1 rounded-md text-muted hover:text-foreground hover:bg-surface-2 transition-colors cursor-pointer"
                                aria-label="Close sidebar">
                            <c-icon name="menu_close" class="size-5" />
                        </button>
                    </div>
                    <div class="pl-4 pr-4">
                        {% block sidebar_content %}
                        {% endblock sidebar_content %}
                    </div>
                </div>
            </div>

            <!-- Main content area -->
            <div class="flex-1 min-w-0">
                {% block content %}
                {% endblock content %}
            </div>
        </div>
    </div>

{% endblock body %}
