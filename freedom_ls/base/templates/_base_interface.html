{% extends "_base.html" %}

{% block body %}

    <div x-data="sidebarComponent"
         data-storage-key="{% block sidebar_storage_key %}sidebar{% endblock sidebar_storage_key %}"
         class="flex relative {% block sidebar_class %}{% endblock sidebar_class %}">

        <!-- Mobile backdrop -->
        <div x-cloak
             x-show="sidebarOpen && isMobile"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             x-on:click="closeSidebar"
             class="fixed inset-0 z-30 bg-black/50"
             aria-hidden="true">
        </div>

        <!-- Sidebar column: always rendered -->
        <div class="shrink-0"
             x-bind:class="sidebarOpen && !isMobile ? 'w-64' : ''">

            <!-- Single toggle button: always visible, same position -->
            <div class="flex" x-bind:class="sidebarOpen ? 'justify-end' : 'justify-start'">
                <button x-on:click="toggle"
                        class="p-2 rounded-md text-muted hover:text-foreground hover:bg-surface-2 transition-colors cursor-pointer"
                        aria-label="Toggle sidebar"
                        x-bind:aria-expanded="sidebarOpen">
                    <span x-show="sidebarOpen" x-cloak><c-icon name="menu_close" class="size-5" /></span>
                    <span x-show="!sidebarOpen"><c-icon name="menu_open" class="size-5" /></span>
                </button>
            </div>

            <!-- Sidebar panel -->
            <div x-cloak
                 x-show="sidebarOpen"
                 x-on:click="handleSidebarClick"
                 x-transition:enter="transition-all duration-300 ease-out"
                 x-transition:enter-start="opacity-0 -translate-x-2"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition-all duration-200 ease-in"
                 x-transition:leave-start="opacity-100 translate-x-0"
                 x-transition:leave-end="opacity-0 -translate-x-2"
                 x-bind:class="isMobile ? 'fixed inset-y-0 left-0 z-40 w-64 bg-surface shadow-lg overflow-y-auto p-4 pt-14' : ''">
                {% block sidebar_content %}
                {% endblock sidebar_content %}
            </div>
        </div>

        <!-- Main content area -->
        <div class="flex-1 min-w-0">
            {% block content %}
            {% endblock content %}
        </div>
    </div>

{% endblock body %}
