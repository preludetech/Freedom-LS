<c-vars storage_key="sidebar" class="" />

<div x-data="{
        sidebarOpen: JSON.parse(localStorage.getItem('{{ storage_key }}')) ?? window.matchMedia('(min-width: 1024px)').matches,
        isMobile: !window.matchMedia('(min-width: 1024px)').matches,
        init() {
            const mq = window.matchMedia('(min-width: 1024px)');
            mq.addEventListener('change', (e) => {
                this.isMobile = !e.matches;
            });
            this.$watch('sidebarOpen', (val) => {
                localStorage.setItem('{{ storage_key }}', JSON.stringify(val));
            });
        },
        toggle() { this.sidebarOpen = !this.sidebarOpen; }
     }"
     class="flex relative {{ class }}"
     {{ attrs }}>

    <!-- Toggle button: visible when sidebar is collapsed -->
    <button x-show="!sidebarOpen"
            x-transition
            @click="toggle()"
            class="absolute left-0 top-0 z-10 mt-1 flex items-center gap-1.5 shrink-0 px-1 sm:px-2 py-1.5 rounded-md text-sm font-medium text-muted bg-surface-2 hover:bg-surface-2 hover:text-foreground transition-colors cursor-pointer"
            aria-label="Open sidebar">
        <c-icon name="menu_open" class="size-4" />
    </button>

    <!-- Mobile backdrop -->
    <div x-cloak
         x-show="sidebarOpen && isMobile"
         x-transition:enter="ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="sidebarOpen = false"
         class="fixed inset-0 z-30 bg-black/50"
         aria-hidden="true">
    </div>

    <!-- Sidebar panel -->
    <div x-cloak
         x-show="sidebarOpen"
         x-transition:enter="transition-all duration-300 ease-out"
         x-transition:enter-start="opacity-0 -translate-x-2"
         x-transition:enter-end="opacity-100 translate-x-0"
         x-transition:leave="transition-all duration-200 ease-in"
         x-transition:leave-start="opacity-100 translate-x-0"
         x-transition:leave-end="opacity-0 -translate-x-2"
         :class="isMobile ? 'fixed inset-y-0 left-0 z-40 w-64 bg-surface shadow-lg overflow-y-auto p-4' : 'relative w-64 shrink-0'">

        <!-- Close button inside sidebar -->
        <div class="flex justify-end mb-2">
            <button @click="toggle()"
                    class="p-3 lg:px-2 lg:py-1.5 rounded-md text-muted/50 hover:text-muted hover:bg-surface-2 transition-colors cursor-pointer"
                    aria-label="Close sidebar">
                <c-icon name="menu_close" class="size-5" />
            </button>
        </div>

        <!-- Sidebar content slot -->
        {{ slot }}
    </div>

    <!-- Main content area -->
    <div class="flex-1 min-w-0">
        {{ content }}
    </div>
</div>

{% comment %}
Usage:
<c-sidebar storage_key="sidebar-educator" class="gap-6 pt-8">
    <!-- Default slot: sidebar navigation content -->
    <nav>...</nav>

    <!-- Named slot: main content -->
    <c-slot name="content">
        <div>Main page content here</div>
    </c-slot>
</c-sidebar>
{% endcomment %}
