{% load base_tags %}
<c-vars title footer class="" id="" open="false" />

{% unique_id "modal-title" as modal_title_id %}

<!-- Modal backdrop and container -->
<div x-data="modal"
     data-open="{{ open }}"
     x-on:keydown.escape.window="onEscape"
     x-cloak
     {% if id %} id="{{ id }}" {% endif %}
     {{ c.attrs }}>

    {% if trigger %}
        <!-- Trigger slot - the element that opens the modal -->
        <div x-on:click="show">
            {{ trigger }}
        </div>

    {% endif %}

    <!-- Modal overlay -->
    <div x-show="open"
         x-cloak
         class="fixed inset-0 z-50 overflow-y-auto"
         aria-labelledby="{{ modal_title_id }}"
         role="dialog"
         aria-modal="true">

        <!-- Backdrop -->
        <div x-show="open"
             x-transition:enter="ease-out duration-300"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="ease-in duration-200"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"
             class="fixed inset-0 backdrop-blur-sm transition-opacity"
             x-on:click="close">
        </div>

        <!-- Modal panel -->
        <div class="flex min-h-full items-center justify-center p-4">
            <div x-show="open"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 class=" relative transform overflow-hidden rounded-lg bg-surface shadow-xl transition-all "
                 x-on:click.away="close">

                <!-- Header -->
                <div class="bg-surface px-6 py-4 border-b border-border border">
                    <div class="flex items-center justify-between">
                        <h3 class="text-lg font-semibold" id="{{ modal_title_id }}">
                            {{ title }}
                        </h3>
                        <button x-on:click="close"
                                type="button"
                                class="text-muted hover:text-foreground focus:outline-none focus:ring-2 focus:ring-primary rounded-md">
                            <span class="sr-only">Close</span>
                            <c-icon name="close" class="size-6" />
                        </button>
                    </div>
                </div>

                <!-- Content -->
                <div class="{{ class }} bg-surface px-6 py-4 ">

                    {{ slot }}
                </div>

                <!-- Footer (optional) -->
                <c-button-group variant="space-between" class="bg-surface px-6 py-4 border-t border-border">
                    {{ footer }}
                </c-button-group>
            </div>
        </div>
    </div>
</div>
