<c-vars message id />

{# first_class Tier-3 override of base/templates/cotton/loading-indicator.html.
   Demo override: replaces the spinning icon with a brand-coloured pulsing dot
   row, message rendered in the `font-display` (Outfit) family. Honours the
   same <c-vars> contract as the default. #}
<div id="{{ id|default:'loading' }}" class="htmx-indicator fls-first-class-loading-indicator text-center py-12 {{ c.attrs.class }}">
    <div class="flex justify-center items-center gap-2" aria-hidden="true">
        <span class="size-3 rounded-full bg-primary animate-pulse [animation-delay:-0.3s]"></span>
        <span class="size-3 rounded-full bg-primary animate-pulse [animation-delay:-0.15s]"></span>
        <span class="size-3 rounded-full bg-primary animate-pulse"></span>
    </div>
    <p class="mt-4 font-display text-muted">{{ message|default:"Loading..." }}</p>
</div>
