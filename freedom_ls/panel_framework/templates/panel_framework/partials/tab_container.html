<div x-data="tabContainer"
     data-active-tab="{{ active_tab }}"
     data-base-url="{{ base_url }}"
     data-default-tab="{{ tabs.0.name }}">
    {# Tab bar #}
    <div role="tablist" class="flex border-b border-border mb-6">
        {% for tab in tabs %}
            <button x-on:click="handleTabClick"
                    data-tab-name="{{ tab.name }}"
                    class="px-4 py-2 -mb-px transition-colors"
                    role="tab"
                    aria-selected="{% if tab.name == active_tab %}true{% else %}false{% endif %}">
                {{ tab.label }}
            </button>
        {% endfor %}
    </div>

    {# Tab panels #}
    {% for tab in tabs %}
        <div data-tab-panel="{{ tab.name }}"
             id="tab-content-{{ tab.name }}"
             role="tabpanel"
             {% if tab.name != active_tab %}hidden{% endif %}
             data-tab-url="{{ tab.load_url }}">
            {% if tab.name == active_tab %}
                {{ tab.rendered_panels|safe }}
            {% else %}
                <div hx-get="{{ tab.load_url }}"
                     hx-trigger="load-tab once"
                     hx-swap="innerHTML">
                    <c-loading-indicator />
                </div>
            {% endif %}
        </div>
    {% endfor %}
</div>
