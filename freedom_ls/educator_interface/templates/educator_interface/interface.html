{% extends "_base.html" %}

{% block body %}

    <c-sidebar storage_key="sidebar-educator" class="pt-8">
        <nav class="sticky top-4 w-64">
            <div class="bg-surface shadow-md rounded-lg p-4">
                <h2 class="text-lg font-semibold mb-4">Navigation</h2>
                <ul class="list-none ml-0">
                    {% for item in menu_items %}
                        <li>
                            <a href="{{ item.url }}">
                                {{ item.label }}
                            </a>
                        </li>
                    {% endfor %}
                </ul>
            </div>
        </nav>

        <c-slot name="content">
            <div class="space-y-4 pl-2 sm:pl-6">
                {% if heading %}
                    <h1>
                        {{ heading }}
                    </h1>
                {% endif %}
                {{ content|safe }}
            </div>
        </c-slot>
    </c-sidebar>

{% endblock body %}
